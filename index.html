<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Woodpecker Method Trainer</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .stats-bar { background: #333; padding: 10px 20px; border-radius: 5px; margin-bottom: 15px; width: 410px; display: flex; justify-content: space-between; font-weight: bold; }
        #board { width: 450px; border: 5px solid #444; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .status-panel { background: #2d2d2d; padding: 15px; margin-top: 20px; width: 420px; border-radius: 5px; text-align: center; min-height: 40px; border-bottom: 4px solid #444; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; color: white; min-width: 120px; }
        .btn-prev { background: #7f8c8d; }
        .btn-next { background: #27ae60; }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
    </style>
</head>
<body>

    <h2>Woodpecker Method Trainer</h2>
    
    <div class="stats-bar">
        <span>Exercise: <span id="current-num">1</span> / 1128</span>
        <span>Score: <span id="score">0</span></span>
    </div>

    <div id="board"></div>

    <div class="status-panel" id="status">Calculate the winning line...</div>

    <div class="controls">
        <button class="btn btn-prev" onclick="prevPuzzle()">Previous</button>
        <button class="btn btn-next" onclick="nextPuzzle()">Next</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var currentIdx = 0;
        var moveIdx = 0;
        var points = 0;

        // DATA: First few for testing - Add the rest here later!
        const puzzles = [
            { fen: '4r3/p4pkp/1p4p1/8/P1b5/2r1P3/3R1PPP/1R4K1 b - - 0 1', moves: ['Rxe3', 'fxe3', 'Rxh2+', 'Kxh2', 'Rh8#'], info: "Hamppe – Steinitz, 1860" },
            { fen: 'r1bq1rk1/pppp1ppp/2n5/4P3/2B5/2P2N2/P4PPP/R1BQR1K1 w - - 0 1', moves: ['d6', 'cxd6', 'Rf8+'], info: "Steinitz – Wilson, 1862" },
            { fen: '2r3k1/1pRb1ppp/q3pn2/1p1p4/1Q1P4/P3PN2/1P3PPP/4K2R w K - 0 1', moves: ['Rxc8+', 'Bxc8', 'Bxf4'], info: "Steinitz – Dubois, 1862" }
        ];

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            var expected = puzzles[currentIdx].moves[moveIdx];
            if (move.san === expected || move.lan === expected.toLowerCase()) {
                moveIdx++;
                if (moveIdx === puzzles[currentIdx].moves.length) {
                    points++;
                    document.getElementById('score').innerText = points;
                    document.getElementById('status').innerHTML = '<span class="correct">✅ COMPLETE! ' + puzzles[currentIdx].info + '</span>';
                    document.querySelector('.status-panel').style.borderBottomColor = "#2ecc71";
                } else {
                    document.getElementById('status').innerHTML = '<span>⭐ Good! Find the follow-up...</span>';
                    setTimeout(makeOpponentMove, 600);
                }
            } else {
                document.getElementById('status').innerHTML = '<span class="wrong">❌ Incorrect. Try again!</span>';
                document.querySelector('.status-panel').style.borderBottomColor = "#e74c3c";
                setTimeout(resetPuzzle, 1000);
            }
        }

        function makeOpponentMove() {
            game.move(puzzles[currentIdx].moves[moveIdx]);
            board.position(game.fen());
            moveIdx++;
        }

        function resetPuzzle() {
            moveIdx = 0;
            game.load(puzzles[currentIdx].fen);
            board.position(puzzles[currentIdx].fen);
            document.getElementById('status').innerText = (game.turn() === 'w' ? "White" : "Black") + " to move.";
            document.querySelector('.status-panel').style.borderBottomColor = "#444";
        }

        function updateDisplay() {
            moveIdx = 0;
            game.load(puzzles[currentIdx].fen);
            board.position(puzzles[currentIdx].fen);
            board.orientation(game.turn() === 'w' ? 'white' : 'black');
            document.getElementById('current-num').innerText = currentIdx + 1;
            document.getElementById('status').innerText = (game.turn() === 'w' ? "White" : "Black") + " to move.";
            document.querySelector('.status-panel').style.borderBottomColor = "#444";
        }

        function nextPuzzle() { if (currentIdx < puzzles.length - 1) { currentIdx++; updateDisplay(); } }
        function prevPuzzle() { if (currentIdx > 0) { currentIdx--; updateDisplay(); } }

        board = Chessboard('board', {
            draggable: true,
            dropOffBoard: 'snapback',
            onDrop: onDrop,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        $(window).resize(board.resize);
        updateDisplay();
    </script>
</body>
</html>
